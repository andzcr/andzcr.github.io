<style>
/* =========================================
   VARIABLES & FONTS
   ========================================= */
@font-face {
    font-family: 'Sora';
    src: url('https://andzcr.github.io/resources/fonts/PlayfairDisplay-Regular.ttf') format('truetype');
    font-display: swap;
}
@font-face {
    font-family: 'Great';
    src: url('https://andzcr.github.io/resources/fonts/GreatVibes-Regular.ttf') format('truetype');
    font-display: swap;
}
@font-face {
    font-family: 'TitleFont';
    src: url('https://andzcr.github.io/resources/fonts/forth.otf') format('opentype');
    font-display: swap;
}

@property --angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: true;
}

:root {
    --primary-bg: #000000;
    --text-muted: rgba(255, 255, 255, 0.5);
    --easing: cubic-bezier(0.76, 0, 0.24, 1);
    --crimson: rgb(255, 0, 0); 
    --premium-gradient: linear-gradient(-45deg, #191919, #ffffff);
    --premium-gradient-two: linear-gradient(135deg, #ffffff, #2b2b2b);
    --premium-solid: #ffffff; 
    --border-gradient: linear-gradient(to right, black 0%, white 50%, black 100%);
    --border-gradient-title: linear-gradient(to right, black 0%, rgb(84, 84, 84) 50%, black 100%);
    --primary-font: #ffffff;
    --accept: #2bff00;
    --decline: #ff0000;
    --primary-mask: black;
    --secondary-mask: rgba(0, 0, 0, 0.156);
    --secondary-font: white;
    --primary-review: rgba(255, 255, 255, 0.096);
    --secondary-review: rgb(0, 0, 0);
    --review-font: rgb(255, 255, 255);
    --footer-font: white;
    --scrolling-bar: #ffffff; 
    
    /* Variable pastrate pentru functionalitate */
    --card-bg: #000000;
    --accent-gold: #D4AF37;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { margin: 0; padding: 0; background: var(--primary-bg); overflow: hidden; }

#home {
    background: var(--primary-bg);
    position: relative;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Sora', sans-serif;
    color: var(--primary-font);
    perspective: 1200px; /* Essential for 3D effect */
    display: flex;
    justify-content: center;
    align-items: center;
}

/* =========================================
   95% BACKGROUND WRAPPER
   ========================================= */
.bg-reveal-wrapper {
    position: absolute;
    width: 95%;
    height: 95%;
    border-radius: 40px; 
    z-index: 0;
    overflow: hidden;
    box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5);
    background: var(--card-bg);
    transform: translateZ(0); 
}

.bg-base {
    position: absolute;
    inset: 0;
    background-image: url('https://andzcr.github.io/resources/photos/background.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 1;
    opacity: 0;
    animation: fadeInBg 2s ease forwards;
}

@keyframes fadeInBg { to { opacity: 1; } }

#reveal-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2; 
    pointer-events: none; 
    opacity: 0; 
    transition: opacity 1s ease;
}

#reveal-canvas.ready { opacity: 1; }

.video-gradient-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3; 
    border-radius: 40px;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.1) 0%,
        transparent 40%,
        rgba(0, 0, 0, 0.4) 70%,
        rgba(0, 0, 0, 0.9) 100%
    );
}

.home-content {
    position: relative;
    z-index: 5;
    width: 95%;
    height: 95%;
    pointer-events: none;
}

/* =========================================
   TOP LEFT: 3D ROTATING LOGO
   ========================================= */
.brand-header {
    position: absolute;
    top: 50px; 
    left: 5%; 
    z-index: 50;
    pointer-events: auto;
}

.logo-container {
    display: flex;
    align-items: center;
    gap: 15px;
    font-family: 'Sora', sans-serif;
    color: var(--premium-solid);
}

/* Containerul care se roteste */
.logo-3d-wrapper {
    position: relative;
    width: 50px; 
    height: 50px;
    transform-style: preserve-3d; /* CRUCIAL PENTRU 3D */
    animation: rotateLogo 8s linear infinite;
}

/* Fiecare strat al logo-ului */
.logo-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    font-size: 3rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent-gold);
    /* Calculam pozitia Z in functie de indexul stratului (--i) */
    transform: translateZ(calc(var(--i) * 1px));
    /* Adaugam un shadow fin pentru realism */
    text-shadow: 0 0 2px rgba(0,0,0,0.3);
}

/* Stratul din spate si mijloc - mai intunecate pentru a simula "marginea" */
.logo-layer:not(:last-child) {
    color: #8a701e; /* Dark gold for thickness */
    filter: brightness(0.7);
}

/* Stratul din fata - stralucitor */
.logo-layer:last-child {
    color: var(--accent-gold);
    filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.5));
}

.brand-name {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 4px;
    opacity: 0;
    animation: fadeInElement 1s ease forwards 0.5s;
    background: var(--premium-gradient-two);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

@keyframes rotateLogo {
    0% { transform: rotateY(0deg) rotateX(10deg); }
    100% { transform: rotateY(360deg) rotateX(10deg); }
}

/* =========================================
   TOP RIGHT: SOCIAL SLIDER
   ========================================= */
.social-rail-wrapper {
    position: absolute;
    top: 50px;
    right: 5%; 
    width: 200px; 
    /* MODIFICARE: Am marit inaltimea la 100px pentru a face loc textului */
    height: 100px; 
    z-index: 50;
    pointer-events: auto;
    overflow: hidden;
    mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
    -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
    display: flex;
    align-items: center; /* Mentine iconitele centrate vertical in noul spatiu */
}

.social-track {
    display: flex;
    gap: 30px;
    will-change: transform;
}

.social-item {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #000; 
    cursor: pointer;
    transition: transform 0.4s var(--easing), filter 0.4s ease, opacity 0.4s ease;
    flex-shrink: 0;
    /* Asiguram ca itemul are spatiu suficient */
    height: 60px; 
    width: 50px;
}

.social-item ion-icon {
    font-size: 1.6rem;
    transition: color 0.3s ease;
    /* Iconita ramane fixa, nu este afectata de aparitia textului */
}

.social-tag {
    position: absolute;
    /* Pozitionam textul sub iconita */
    top: 70%; 
    margin-top: 5px;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    opacity: 0;
    color: var(--premium-solid); 
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    transform: translateY(-5px);
    transition: all 0.3s ease;
    white-space: nowrap;
    font-family: 'Sora', sans-serif;
    pointer-events: none; /* Previne flicker-ul la hover pe text */
}

.social-rail-wrapper:hover .social-item {
    opacity: 0.5;
    filter: blur(2px);
    transform: scale(0.9);
}

.social-rail-wrapper:hover .social-item:hover {
    opacity: 1;
    filter: blur(0);
    transform: scale(1.3);
    z-index: 2;
}

.social-rail-wrapper:hover .social-item:hover ion-icon {
    color: var(--accent-gold);
}

.social-rail-wrapper:hover .social-item:hover .social-tag {
    opacity: 1;
    transform: translateY(0);
}

/* =========================================
   BOTTOM LEFT: SLOGAN
   ========================================= */
.slogan-container {
    position: absolute;
    bottom: 80px;
    left: 40px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    z-index: 10;
    pointer-events: auto;
}

.slogan-top {
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 2px;
    color: var(--text-muted);
    font-family: 'Sora', sans-serif;
    margin-bottom: -5px;
    opacity: 0;
    animation: fadeInElement 1s ease forwards 1s;
}

.slogan-middle {
    font-size: 6rem;
    font-weight: 800;
    line-height: 1;
    font-family: 'TitleFont', sans-serif;
    background: var(--premium-gradient-two);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
    opacity: 0;
    animation: fadeInElement 1s ease forwards 1.3s;
}

.word-rotator {
    height: 1.5em; 
    overflow: hidden;
    position: relative;
    font-size: 3rem;
    font-family: 'Great', cursive;
    color: var(--accent-gold);
    min-width: 300px;
    margin-left: 5px;
    opacity: 0;
    animation: fadeInElement 1s ease forwards 1.6s;
}

.rotating-word {
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    transform: translateY(100%);
    transition: all 0.8s var(--easing);
    white-space: nowrap;
}

.rotating-word.active {
    opacity: 1;
    transform: translateY(0);
}

.rotating-word.exit {
    opacity: 0;
    transform: translateY(-100%);
}

/* =========================================
   SMART BADGE
   ========================================= */
.smart-badge-wrapper {
    position: absolute;
    bottom: 40px;
    z-index: 50;
    opacity: 0;
    animation: fadeInElement 1s ease forwards;
    animation-delay: 2s;
    transition: transform 0.6s var(--easing), opacity 0.6s ease;
    transform-style: preserve-3d;
    pointer-events: auto;
}

.smart-badge-wrapper.right { right: 20px; }

.smart-badge {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 170px;
    height: 54px;
    background: transparent; 
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid transparent; 
    border-radius: 100px;
    text-decoration: none;
    color: var(--secondary-font);
    overflow: hidden;
    transition: width 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), height 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), border-radius 0.5s ease;
    box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
    cursor: pointer;
    transform-style: preserve-3d;
    isolation: isolate; 
}

.smart-badge .badge-label, .smart-badge .badge-icon { color: var(--secondary-font); }

.smart-badge::after {
    content: '';
    position: absolute;
    inset: 0;
    padding: 1.5px;
    border-radius: inherit;
    background: conic-gradient(from var(--angle), transparent 50%, rgba(255, 255, 255, 0.8) 85%, #ffffff 95%, transparent 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    z-index: 1; 
    pointer-events: none;
}

.smart-badge::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 2px;
    background: radial-gradient(200px circle at var(--x, 50%) var(--y, 50%), rgba(255, 255, 255, 0.15), transparent 70%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.6;
    pointer-events: none;
    z-index: 2;
}

.magnetic-glow {
    position: absolute;
    inset: -30px;
    background: radial-gradient(circle at center, rgba(255, 255, 255, 0.4), transparent 70%);
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: -1;
    pointer-events: none;
    transform: translateZ(-10px);
}
.smart-badge:hover .magnetic-glow { opacity: 0.6; }

@media (min-width: 769px) {
    .smart-badge:hover {
        width: 460px;
        height: 260px;
        border-radius: 24px;
        background: rgba(20, 20, 20, 0.95); 
        box-shadow: 0 40px 90px -20px rgba(0,0,0,1);
    }
    .smart-badge-wrapper.right .smart-badge { transform-origin: right center; }
}

.badge-label {
    position: absolute;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.3s ease;
    transform: translateZ(20px);
}

@media (min-width: 769px) {
    .smart-badge:hover .badge-label {
        opacity: 0;
        transform: translateY(-10px) scale(0.9);
        filter: blur(4px);
    }
}

.badge-content {
    position: absolute;
    inset: 0;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.4s ease 0.1s, visibility 0.4s ease 0.1s;
    display: flex;
    flex-direction: column;
    z-index: 5;
}
@media (min-width: 769px) {
    .smart-badge:hover .badge-content { opacity: 1; visibility: visible; }
}

.badge-abstract-bg {
    position: absolute;
    inset: 0;
    border-radius: 24px;
    background: #111;
    z-index: 0;
    overflow: hidden;
}
.contact-layout {
    justify-content: space-between;
    height: 100%;
    position: relative;
    z-index: 2;
    padding: 32px;
}

/* Contact Styles */
.c-header, .c-body, .c-footer, .c-info { display: flex; flex-direction: column; }
.c-title { font-size: 1.8rem; font-weight: 700; color: var(--premium-solid); margin: 0; font-family: 'TitleFont', sans-serif; }
.c-row { display: flex; align-items: center; gap: 16px; margin-bottom: 15px; }
.c-icon-circle { width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; color: #fff; font-size: 1.2rem; }
.c-type { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); }

.c-footer { flex-direction: row; justify-content: space-between; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
.c-location { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #aaa; }
.loc-dot { width: 6px; height: 6px; background: #fff; border-radius: 50%; }
.c-action-text { font-size: 0.8rem; color: #fff; display: flex; align-items: center; gap: 6px; }

@keyframes fadeInElement { from { opacity: 0; } to { opacity: 1; } }

@media (max-width: 768px) {
    .bg-reveal-wrapper { width: 100%; height: 100%; border-radius: 0; }
    .brand-header { left: 24px; top: 30px; }
    .social-rail-wrapper { display: none; }
    .slogan-container { bottom: 120px; left: 24px; }
    .slogan-middle { font-size: 3.5rem; }
    .word-rotator { font-size: 2rem; min-width: auto; }
    .smart-badge-wrapper.right { position: fixed; bottom: 30px; left: 24px; right: 24px; width: auto; }
    .smart-badge { width: 100% !important; height: 56px !important; border-radius: 16px; background: rgba(20,20,20,0.8); }
    .smart-badge:hover .badge-content { display: none; }
    .smart-badge .badge-label { opacity: 1 !important; transform: none !important; filter: none !important; }
}
</style>
<script>
document.addEventListener('DOMContentLoaded', () => {
    'use strict';

    // --- CONFIGURAȚIE GENERALĂ ---
    const CONFIG = {
        proximity: 300,         
        magneticForce: 0.4,     
        smoothness: 0.1,        
        angleSmoothness: 0.1, 
        tiltStrength: 15,       
        scaleOnHover: 1.02,
        rotationSpeed: 0.2      
    };

    let mouseX = 0;
    let mouseY = 0;
    let isMobile = window.innerWidth <= 768;

    window.addEventListener('resize', () => {
        isMobile = window.innerWidth <= 768;
        if(isMobile) {
            document.querySelectorAll('.smart-badge').forEach(el => el.style.transform = '');
        }
    });

    document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    // ==================================================
    // 1. WORD ROTATOR SYSTEM
    // ==================================================
    const initWordRotator = () => {
        const words = document.querySelectorAll('.rotating-word');
        if (words.length === 0) return;

        let currentIndex = 0;
        const intervalTime = 3000;

        setInterval(() => {
            const currentWord = words[currentIndex];
            const nextIndex = (currentIndex + 1) % words.length;
            const nextWord = words[nextIndex];

            // Exit
            currentWord.classList.remove('active');
            currentWord.classList.add('exit');

            setTimeout(() => {
                currentWord.classList.remove('exit');
                void currentWord.offsetWidth; 
            }, 800); 

            // Enter
            nextWord.classList.remove('exit');
            nextWord.classList.add('active');

            currentIndex = nextIndex;
        }, intervalTime);
    };
    initWordRotator();

    // ==================================================
    // 2. SMOOTH SOCIAL SLIDER (Inertia based)
    // ==================================================
    class SmoothSlider {
        constructor() {
            this.track = document.getElementById('social-track');
            this.container = document.querySelector('.social-rail-wrapper');
            if(!this.track || !this.container) return;

            this.items = Array.from(document.querySelectorAll('.social-item'));
            this.scrollPos = 0;
            
            // Viteze (Mai lent pentru efect cinematic)
            this.baseSpeed = 0.2; 
            this.targetSpeed = this.baseSpeed;
            this.currentSpeed = this.baseSpeed;
            
            // Calculăm lățimea
            this.trackWidth = this.track.scrollWidth / 2; 
            
            this.isHovering = false;

            this.initEvents();
            this.animate();
        }

        initEvents() {
            this.container.addEventListener('mouseenter', () => {
                this.isHovering = true;
                this.targetSpeed = 0; // Oprire smooth
            });

            this.container.addEventListener('mouseleave', () => {
                this.isHovering = false;
                this.targetSpeed = this.baseSpeed; // Revenire smooth la viteză
            });
            
            window.addEventListener('resize', () => {
                this.trackWidth = this.track.scrollWidth / 2;
            });
        }

        animate() {
            // Lerp pentru viteza (Inerție)
            this.currentSpeed += (this.targetSpeed - this.currentSpeed) * 0.05;

            // Actualizare poziție
            this.scrollPos += this.currentSpeed;

            // Loop infinit fără glitch
            if (this.scrollPos >= this.trackWidth) {
                this.scrollPos -= this.trackWidth;
            }

            // Aplicare transform
            this.track.style.transform = `translateX(-${this.scrollPos}px)`;

            requestAnimationFrame(() => this.animate());
        }
    }
    const socialSlider = new SmoothSlider();


    // ==================================================
    // 3. LIQUID REVEAL SYSTEM
    // ==================================================
    class LiquidReveal {
        constructor() {
            this.canvas = document.getElementById('reveal-canvas');
            this.container = document.querySelector('.bg-reveal-wrapper');
            this.isMobile = window.innerWidth <= 768;
            if (!this.canvas || this.isMobile) return;

            this.ctx = this.canvas.getContext('2d', { willReadFrequently: false });
            this.width = 0;
            this.height = 0;
            
            this.bgImage = new Image();
            this.bgImage.crossOrigin = "Anonymous";
            this.bgImage.src = 'https://andzcr.github.io/resources/photos/effect.jpg';

            this.points = [];
            this.maxAge = 120;
            this.radius = 160;
            
            // Coordonatele relative la canvas
            this.lastX = 0;
            this.lastY = 0;

            this.init();
        }

        init() {
            this.resize();
            window.addEventListener('resize', () => {
                this.resize();
                this.isMobile = window.innerWidth <= 768;
                if(this.isMobile) this.canvas.style.display = 'none';
                else this.canvas.style.display = 'block';
            });
            
            this.bgImage.onload = () => {
                this.canvas.classList.add('ready');
                this.animate();
            };
        }

        resize() {
            // Luăm dimensiunile containerului părint
            const rect = this.container.getBoundingClientRect();
            this.width = rect.width;
            this.height = rect.height;
            this.canvas.width = this.width;
            this.canvas.height = this.height;
        }

        getRelativeMousePosition() {
            const rect = this.canvas.getBoundingClientRect();
            return {
                x: mouseX - rect.left,
                y: mouseY - rect.top
            };
        }

        addPoint(x, y) {
            if(x < 0 || x > this.width || y < 0 || y > this.height) return;

            const dist = Math.hypot(x - this.lastX, y - this.lastY);
            const steps = Math.min(Math.ceil(dist / 20), 10); 
            
            for (let i = 0; i < steps; i++) {
                const interactX = this.lastX + (x - this.lastX) * (i / steps);
                const interactY = this.lastY + (y - this.lastY) * (i / steps);
                
                this.points.push({
                    x: interactX,
                    y: interactY,
                    age: this.maxAge,
                    currentRadius: this.radius + Math.min(dist * 0.5, 30)
                });
            }

            this.lastX = x;
            this.lastY = y;
        }

        animate() {
            if (this.isMobile) return;

            this.ctx.clearRect(0, 0, this.width, this.height);

            const relPos = this.getRelativeMousePosition();
            
            if (mouseX !== 0 && mouseY !== 0) {
                if(this.lastX === 0 && this.lastY === 0) {
                    this.lastX = relPos.x;
                    this.lastY = relPos.y;
                }
                this.addPoint(relPos.x, relPos.y);
            }

            this.points.forEach((point, i) => {
                point.age--;
                
                if (point.age <= 0) {
                    this.points.splice(i, 1);
                } else {
                    const intensity = point.age / this.maxAge;
                    const grad = this.ctx.createRadialGradient(point.x, point.y, 0, point.x, point.y, point.currentRadius);
                    grad.addColorStop(0, `rgba(255, 255, 255, ${intensity})`);
                    grad.addColorStop(0.5, `rgba(255, 255, 255, ${intensity * 0.8})`);
                    grad.addColorStop(1, 'rgba(255, 255, 255, 0)');

                    this.ctx.fillStyle = grad;
                    this.ctx.beginPath();
                    this.ctx.arc(point.x, point.y, point.currentRadius, 0, Math.PI * 2);
                    this.ctx.fill();
                }
            });

            this.ctx.globalCompositeOperation = 'source-in';
            
            const imgRatio = this.bgImage.width / this.bgImage.height;
            const canvasRatio = this.width / this.height;
            let renderW, renderH, offsetX, offsetY;

            if (canvasRatio > imgRatio) {
                renderW = this.width;
                renderH = this.width / imgRatio;
                offsetX = 0;
                offsetY = (this.height - renderH) / 2;
            } else {
                renderH = this.height;
                renderW = this.height * imgRatio;
                offsetX = (this.width - renderW) / 2;
                offsetY = 0;
            }
            
            this.ctx.drawImage(this.bgImage, offsetX, offsetY, renderW, renderH);
            this.ctx.globalCompositeOperation = 'source-over';

            requestAnimationFrame(() => this.animate());
        }
    }

    setTimeout(() => {
        const revealEffect = new LiquidReveal();
    }, 100);


    // ==================================================
    // 4. MAGNETIC BADGE LOGIC
    // ==================================================
    class MagneticBadge {
        constructor(el) {
            this.el = el;
            this.isRight = this.el.closest('.smart-badge-wrapper').classList.contains('right');
            this.x = 0;
            this.y = 0;
            this.currentAngle = 0; 
            this.isHovering = false;
            
            this.el.addEventListener('mouseenter', () => this.isHovering = true);
            this.el.addEventListener('mouseleave', () => this.isHovering = false);
            
            this.animate();
        }

        lerp(start, end, factor) {
            return start + (end - start) * factor;
        }

        lerpAngle(current, target, factor) {
            let cur = current % 360;
            let tar = target % 360;
            if (cur < 0) cur += 360;
            if (tar < 0) tar += 360;
            let diff = tar - cur;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            return cur + diff * factor;
        }

        animate() {
            const rect = this.el.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const distanceX = mouseX - centerX;
            const distanceY = mouseY - centerY;
            const dist = Math.sqrt(distanceX ** 2 + distanceY ** 2);

            const angleRad = Math.atan2(mouseY - centerY, mouseX - centerX);
            let mouseAngleDeg = angleRad * (180 / Math.PI) + 90;

            const time = Date.now() * CONFIG.rotationSpeed;
            let idleAngleDeg = this.isRight ? (-time + 180) : time;

            let targetAngle;
            
            if (!isMobile && dist < CONFIG.proximity) {
                targetAngle = mouseAngleDeg;
                const relX = mouseX - rect.left;
                const relY = mouseY - rect.top;
                this.el.style.setProperty('--x', `${relX}px`);
                this.el.style.setProperty('--y', `${relY}px`);
            } else {
                targetAngle = idleAngleDeg;
            }

            this.currentAngle = this.lerpAngle(this.currentAngle, targetAngle, CONFIG.angleSmoothness);
            this.el.style.setProperty('--angle', `${this.currentAngle}deg`);

            if (!isMobile) {
                let targetX = 0;
                let targetY = 0;
                let rotateX = 0;
                let rotateY = 0;

                if (dist < CONFIG.proximity) {
                    const pull = (CONFIG.proximity - dist) / CONFIG.proximity;
                    targetX = distanceX * CONFIG.magneticForce * pull;
                    targetY = distanceY * CONFIG.magneticForce * pull;
                    rotateY = (distanceX / (rect.width / 2)) * CONFIG.tiltStrength * pull;
                    rotateX = -(distanceY / (rect.height / 2)) * CONFIG.tiltStrength * pull;
                }

                this.x = this.lerp(this.x, targetX, CONFIG.smoothness);
                this.y = this.lerp(this.y, targetY, CONFIG.smoothness);
                
                const currentRotateX = parseFloat(this.el.dataset.rotateX || 0);
                const currentRotateY = parseFloat(this.el.dataset.rotateY || 0);
                
                const newRotateX = this.lerp(currentRotateX, rotateX, CONFIG.smoothness);
                const newRotateY = this.lerp(currentRotateY, rotateY, CONFIG.smoothness);
                
                this.el.dataset.rotateX = newRotateX;
                this.el.dataset.rotateY = newRotateY;

                this.el.style.transform = `
                    translate3d(${this.x}px, ${this.y}px, 0)
                    perspective(1000px)
                    rotateX(${newRotateX}deg)
                    rotateY(${newRotateY}deg)
                    scale(${this.isHovering ? CONFIG.scaleOnHover : 1})
                `;
            } 
            
            requestAnimationFrame(() => this.animate());
        }
    }

    const badges = document.querySelectorAll('.smart-badge');
    badges.forEach(badgeEl => new MagneticBadge(badgeEl));
});
